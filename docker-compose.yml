services:
  timestar:
    build: .
    image: funkbuild/timestar:latest
    ports:
      - "8086:8086"
    volumes:
      - timestar-data:/var/lib/timestar
    environment:
      # Seastar auto-detects all CPUs and memory by default.
      # Uncomment to limit:
      # TIMESTAR_SMP: "4"
      # TIMESTAR_MEMORY: "8G"

      # Auth (disabled by default). Set both to enable:
      # TIMESTAR_AUTH_ENABLED: "true"
      # TIMESTAR_AUTH_TOKEN: "change-me-to-a-secret"

      # See `timestar_http_server --dump-config` for all TIMESTAR_* env vars.
    restart: unless-stopped

volumes:
  timestar-data:
