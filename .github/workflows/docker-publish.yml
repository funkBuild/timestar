name: Docker Publish

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from release tag
        id: version
        run: |
          # Strip 'v' prefix if present (v1.2.3 -> 1.2.3)
          TAG="${GITHUB_REF_NAME#v}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          # Extract major.minor for short tag (1.2.3 -> 1.2)
          MAJOR_MINOR="${TAG%.*}"
          echo "major_minor=${MAJOR_MINOR}" >> "$GITHUB_OUTPUT"
          # Extract major for short tag (1.2.3 -> 1)
          MAJOR="${TAG%%.*}"
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            ENABLE_LTO=ON
          tags: |
            funkbuild/timestar:${{ steps.version.outputs.version }}
            funkbuild/timestar:${{ steps.version.outputs.major_minor }}
            funkbuild/timestar:${{ steps.version.outputs.major }}
            funkbuild/timestar:latest
          # Scope the cache to avoid cross-contamination with CI builds.
          # Use no-cache for the runtime stage to ensure apt packages are
          # always fresh (prevents stale layer reuse that can drop packages).
          cache-from: type=gha,scope=docker-publish
          cache-to: type=gha,scope=docker-publish,mode=max
          no-cache-filter: runtime
