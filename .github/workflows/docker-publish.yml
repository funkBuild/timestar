name: Docker Publish

on:
  release:
    types: [published]
  # Manual re-publish / dry-run of an existing tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v1.2.3)"
        required: true
      dry_run:
        description: "Build and verify, but do not push or update main"
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-24.04

    steps:
      # The release tag is the single source of truth for the version. The
      # VERSION file used to be bumped by hand, so a forgotten bump shipped
      # v1.2.2 with 1.2.1 compiled into the binary. Everything below derives
      # from the tag, and the build is blocked if the artifact disagrees.
      - name: Resolve release tag
        id: tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_REF="${{ inputs.tag }}"
          else
            TAG_REF="${GITHUB_REF_NAME}"
          fi
          echo "ref=${TAG_REF}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.ref }}
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive and validate version
        id: version
        run: |
          set -euo pipefail
          # Strip 'v' prefix if present (v1.2.3 -> 1.2.3)
          TAG="${{ steps.tag.outputs.ref }}"
          VERSION="${TAG#v}"

          # cmake stamps MAJOR/MINOR/PATCH into constexpr ints, so reject
          # anything that is not semver before burning a build on it.
          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag '${TAG}' is not MAJOR.MINOR.PATCH[-PRERELEASE]."
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

          # Moving tags (1.2, 1, latest) are only correct for a final release.
          # A prerelease must not displace them.
          if [[ "${VERSION}" == *-* ]] || [ "${{ github.event.release.prerelease }}" = "true" ]; then
            echo "moving_tags=false" >> "$GITHUB_OUTPUT"
          else
            echo "moving_tags=true" >> "$GITHUB_OUTPUT"
            echo "major_minor=${VERSION%.*}" >> "$GITHUB_OUTPUT"
            echo "major=${VERSION%%.*}" >> "$GITHUB_OUTPUT"
          fi

      - name: Stamp VERSION file from tag
        run: |
          set -euo pipefail
          echo "${{ steps.version.outputs.version }}" > VERSION
          echo "VERSION file now: $(cat VERSION)"

      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          V="${{ steps.version.outputs.version }}"
          {
            echo "list<<EOF"
            echo "funkbuild/timestar:${V}"
            if [ "${{ steps.version.outputs.moving_tags }}" = "true" ]; then
              echo "funkbuild/timestar:${{ steps.version.outputs.major_minor }}"
              echo "funkbuild/timestar:${{ steps.version.outputs.major }}"
              echo "funkbuild/timestar:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build locally first so the image can be interrogated before it is
      # published. Nothing reaches Docker Hub until the verify step passes.
      - name: Build image (load locally)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          build-args: |
            ENABLE_LTO=ON
            TIMESTAR_VERSION=${{ steps.version.outputs.version }}
            TIMESTAR_GIT_COMMIT=${{ steps.version.outputs.sha }}
          tags: ${{ steps.tags.outputs.list }}
          # Scope the cache to avoid cross-contamination with CI builds.
          # Use no-cache for the runtime stage to ensure apt packages are
          # always fresh (prevents stale layer reuse that can drop packages).
          cache-from: type=gha,scope=docker-publish
          cache-to: type=gha,scope=docker-publish,mode=max
          no-cache-filter: runtime

      # The gate. This is what makes shipping a mislabelled image impossible:
      # the binary inside the image must report exactly the tag it is named for.
      - name: Verify image version matches tag
        run: |
          set -euo pipefail
          EXPECTED="${{ steps.version.outputs.version }}"
          IMAGE="funkbuild/timestar:${EXPECTED}"

          OUTPUT="$(docker run --rm --entrypoint timestar_http_server "${IMAGE}" --version)"
          echo "${OUTPUT}"

          REPORTED="$(echo "${OUTPUT}" | head -1 | awk '{print $2}')"
          if [ "${REPORTED}" != "${EXPECTED}" ]; then
            echo "::error::Image reports version '${REPORTED}' but is tagged '${EXPECTED}'. Refusing to publish."
            exit 1
          fi
          echo "OK: image reports ${REPORTED}, matching tag ${EXPECTED}"

      - name: Push image
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -n "${tag}" ] || continue
            echo "Pushing ${tag}"
            docker push "${tag}"
          done <<< "${{ steps.tags.outputs.list }}"

      # Keep main honest: commit the released version back so the repo and the
      # published artifact never drift. Skipped for prereleases and dry runs.
      - name: Update VERSION on main
        if: ${{ !inputs.dry_run && steps.version.outputs.moving_tags == 'true' }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          git fetch origin "${DEFAULT_BRANCH}"
          # -f discards the VERSION stamp made for the image build; it is
          # rewritten below. Without it git refuses to leave the detached tag
          # checkout while VERSION is modified.
          git checkout -f -B "${DEFAULT_BRANCH}" "origin/${DEFAULT_BRANCH}"

          echo "${VERSION}" > VERSION
          if git diff --quiet -- VERSION; then
            echo "VERSION on ${DEFAULT_BRANCH} is already ${VERSION} — nothing to commit."
            exit 0
          fi

          git add VERSION
          git commit -m "chore(release): ${VERSION} [skip ci]"

          # Someone may have landed a commit while the image was building.
          for attempt in 1 2 3; do
            if git push origin "${DEFAULT_BRANCH}"; then
              echo "Pushed VERSION=${VERSION} to ${DEFAULT_BRANCH}"
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing on latest ${DEFAULT_BRANCH}"
            git pull --rebase origin "${DEFAULT_BRANCH}"
          done
          echo "::error::Could not push VERSION bump to ${DEFAULT_BRANCH}."
          exit 1

      - name: Summary
        run: |
          {
            echo "### Published \`${{ steps.version.outputs.version }}\`"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Tag | \`${{ steps.tag.outputs.ref }}\` |"
            echo "| Commit | \`${{ steps.version.outputs.sha }}\` |"
            echo "| Moving tags | ${{ steps.version.outputs.moving_tags }} |"
            echo "| Dry run | ${{ inputs.dry_run || false }} |"
            echo ""
            echo "Image version verified against tag before push."
          } >> "$GITHUB_STEP_SUMMARY"
