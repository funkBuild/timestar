name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Code Formatting
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build deps image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: deps
          load: true
          tags: timestar-deps
          cache-from: type=gha,scope=ci-deps
          cache-to: type=gha,scope=ci-deps,mode=max

      - name: Check formatting
        run: |
          docker run --rm -v ${{ github.workspace }}:/src -w /src timestar-deps \
            bash -c 'find lib bin -name "*.cpp" -o -name "*.hpp" | xargs clang-format --dry-run --Werror'

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize submodules (shallow)
        run: git submodule update --init --depth 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build deps image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: deps
          load: true
          tags: timestar-deps
          cache-from: type=gha,scope=ci-deps
          cache-to: type=gha,scope=ci-deps,mode=max

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-

      - name: Configure and build
        run: |
          mkdir -p .ccache build
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            -v ${{ github.workspace }}/.ccache:/ccache \
            -e CCACHE_DIR=/ccache \
            -e CCACHE_MAXSIZE=2G \
            -e CCACHE_COMPRESS=1 \
            timestar-deps \
            bash -c 'ccache -z && cd /src/build && \
              cmake .. \
                -GNinja \
                -DCMAKE_BUILD_TYPE=Release \
                "-DCMAKE_CXX_FLAGS_RELEASE=-O3 -DNDEBUG" \
                -DCMAKE_C_COMPILER=gcc-14 \
                -DCMAKE_CXX_COMPILER=g++-14 \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                -DTIMESTAR_NATIVE_ARCH=OFF \
                -DTIMESTAR_WARNINGS_AS_ERRORS=ON && \
              ninja -j$(nproc) timestar_http_server timestar_unit_test && \
              ccache -s'

      - name: Run unit tests
        run: |
          mkdir -p test-results
          docker run --rm \
            -e CI=true \
            -v ${{ github.workspace }}:/src \
            -v ${{ github.workspace }}/test-results:/test-results \
            timestar-deps \
            bash -c 'cd /src/build && stdbuf -o L ./test/timestar_unit_test -c 2 --gtest_output=xml:/test-results/test-results.xml'
          # -c 2 pins the Seastar shard count so multi-shard tests always run
          # (they FAIL rather than skip when CI=true and smp < 2)

      - name: Fix cache permissions
        if: always()
        run: sudo chown -R $(id -u):$(id -g) .ccache || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/test-results.xml

  coverage:
    name: Coverage (gcov/gcovr)
    runs-on: ubuntu-24.04
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize submodules (shallow)
        run: git submodule update --init --depth 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build deps image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: deps
          load: true
          tags: timestar-deps
          cache-from: type=gha,scope=ci-deps
          cache-to: type=gha,scope=ci-deps,mode=max

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-cov-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-cov-${{ runner.os }}-
            ccache-${{ runner.os }}-

      # Soft threshold: 40% line coverage for lib/ is a floor, not the goal.
      # Ratchet policy: raise COVERAGE_FAIL_UNDER_LINE as real coverage grows
      # (target is the project's 100% goal); never lower it to make CI green.
      - name: Build, test, and generate coverage report
        run: |
          mkdir -p .ccache
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            -v ${{ github.workspace }}/.ccache:/ccache \
            -e CCACHE_DIR=/ccache \
            -e CCACHE_MAXSIZE=2G \
            -e CCACHE_COMPRESS=1 \
            -e COVERAGE_FAIL_UNDER_LINE=40 \
            -e COVERAGE_CMAKE_ARGS='-G Ninja -DCMAKE_C_COMPILER=gcc-14 -DCMAKE_CXX_COMPILER=g++-14 -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DTIMESTAR_NATIVE_ARCH=OFF' \
            timestar-deps \
            bash -c 'apt-get update -qq && apt-get install -y -qq gcovr && \
              ccache -z && cd /src && ./scripts/run_coverage.sh && ccache -s'

      - name: Fix cache permissions
        if: always()
        run: sudo chown -R $(id -u):$(id -g) .ccache build-coverage || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            build-coverage/coverage-html/
            build-coverage/coverage.xml

  benchmarks:
    name: Benchmark Regression Check
    runs-on: ubuntu-24.04
    needs: build-and-test
    # Disabled: CI baseline needs updating after query engine refactor.
    # Superseded by local perf gates (test/timestar_perf_test).
    if: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize submodules (shallow)
        run: git submodule update --init --depth 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build deps image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: deps
          load: true
          tags: timestar-deps
          cache-from: type=gha,scope=ci-deps
          cache-to: type=gha,scope=ci-deps,mode=max

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-bench-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ github.sha }}
            ccache-${{ runner.os }}-

      - name: Build benchmarks
        run: |
          mkdir -p .ccache build
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            -v ${{ github.workspace }}/.ccache:/ccache \
            -e CCACHE_DIR=/ccache \
            -e CCACHE_MAXSIZE=2G \
            -e CCACHE_COMPRESS=1 \
            timestar-deps \
            bash -c 'ccache -z && cd /src/build && \
              cmake .. \
                -GNinja \
                -DCMAKE_BUILD_TYPE=Release \
                "-DCMAKE_CXX_FLAGS_RELEASE=-O3 -DNDEBUG" \
                -DCMAKE_C_COMPILER=gcc-14 \
                -DCMAKE_CXX_COMPILER=g++-14 \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                -DTIMESTAR_NATIVE_ARCH=OFF && \
              ninja -j$(nproc) encoder_benchmark bool_encoder_benchmark && \
              ccache -s'

      - name: Run benchmarks
        run: |
          mkdir -p benchmark-results
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            -v ${{ github.workspace }}/benchmark-results:/benchmark-results \
            timestar-deps \
            bash -c 'cd /src && ./benchmark/run_ci_benchmarks.sh build && cp benchmark/ci_results.json /benchmark-results/'

      - name: Compare against baseline
        run: |
          python3 benchmark/compare_benchmarks.py \
            benchmark/ci_baseline.json \
            benchmark-results/ci_results.json \
            --threshold 15

      - name: Fix cache permissions
        if: always()
        run: sudo chown -R $(id -u):$(id -g) .ccache build || true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: |
            benchmark-results/ci_results.json
            benchmark/benchmark_report.md
