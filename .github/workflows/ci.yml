name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize submodules
        run: git submodule update --init

      - name: Build Docker image (builder stage)
        run: docker build --target builder -t timestar-builder .

      - name: Run unit tests inside Docker
        run: |
          mkdir -p test-results
          docker run --rm \
            -v ${{ github.workspace }}/test-results:/test-results \
            timestar-builder \
            bash -c "cd /src/build && stdbuf -o L ./test/timestar_unit_test --gtest_output=xml:/test-results/test-results.xml"

      - name: Build production Docker image
        run: docker build -t timestar .

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/test-results.xml

  lint:
    name: Code Formatting
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install clang-format
        run: pip install clang-format==22.1.1

      - name: Check formatting
        run: |
          find lib bin -name '*.cpp' -o -name '*.hpp' | \
            xargs clang-format --dry-run --Werror
