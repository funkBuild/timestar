name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: Build (${{ matrix.compiler }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc-14, gcc-13]
        include:
          - compiler: gcc-14
            cc: gcc-14
            cxx: g++-14
          - compiler: gcc-13
            cc: gcc-13
            cxx: g++-13

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            ${{ matrix.cc }} \
            ${{ matrix.cxx }} \
            libc-ares-dev \
            libfmt-dev \
            libleveldb-dev \
            libprotobuf-dev \
            protobuf-compiler \
            libsnappy-dev \
            libssl-dev \
            liburing-dev \
            libboost-all-dev \
            liblz4-dev \
            libgnutls28-dev \
            libsctp-dev \
            libhwloc-dev \
            libnuma-dev \
            libpciaccess-dev \
            libcrypto++-dev \
            libxml2-dev \
            xfslibs-dev \
            systemtap-sdt-dev \
            libyaml-cpp-dev \
            libxxhash-dev \
            ragel

      - name: Configure CMake
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.compiler }}
          path: |
            build/bin/
            build/test/
          retention-days: 1

  test:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libc-ares-dev \
            libleveldb-dev \
            libsnappy-dev \
            libssl-dev \
            libboost-all-dev \
            liblz4-dev \
            libgnutls28-dev \
            libhwloc-dev \
            libnuma-dev \
            libyaml-cpp-dev \
            libxxhash-dev

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-gcc-14
          path: build/

      - name: Make test binaries executable
        run: chmod +x build/test/timestar_test

      - name: Run unit tests
        run: |
          cd build
          ./test/timestar_test --gtest_output=xml:test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/test-results.xml

  lint:
    name: Code Formatting
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install clang-format
        run: pip install clang-format==22.1.1

      - name: Check formatting
        run: |
          find lib bin -name '*.cpp' -o -name '*.hpp' | \
            xargs clang-format --dry-run --Werror
