# TimeStar Example Configuration
#
# This file is NOT required. TimeStar starts with sensible defaults and all
# settings can be overridden via TIMESTAR_* environment variables.
#
# Usage:
#   timestar_http_server --config /path/to/timestar.toml
#
# To see all defaults:
#   timestar_http_server --dump-config

[server]
port = 8086
log_level = "info"
# Root directory for all persisted data: shard_N/ directories (WAL, TSM,
# native_index), placement.json and shard_count.meta are created under it.
# Absolute, or relative to the server's working directory. Created on startup
# if it does not exist. Default: "." (the working directory).
# data_dir = "/var/lib/timestar"
# auth_enabled = true
# auth_token = "my-secret-api-key"

[storage]
# wal_size_threshold = 67108864     # 64 MiB (default)
# max_points_per_block = 3000
# tsm_bloom_fpr = 0.01

# WAL durability: when an acknowledged write is actually on disk.
#   "always"   (default) group commit — a write acks only after its bytes are
#              flushed + fdatasync'd; concurrent writers share one flush, so
#              the cost amortises under load (measured ~0% throughput impact).
#   "interval" ack immediately, flush every wal_sync_interval_ms — bounds the
#              crash-loss window in time; for fsync-hostile storage.
#   "rollover" legacy: durable only at segment rollover/clean shutdown. An
#              OOM-kill silently loses the buffered tail of acked writes.
# wal_sync_mode = "always"
# wal_sync_interval_ms = 100

# [storage.compaction]
# max_concurrent = 2
# batch_size = 10000

[seastar]
# Omit smp and memory to auto-detect all CPUs and available RAM.
# smp = 4
# memory = "8G"
overprovisioned = true
